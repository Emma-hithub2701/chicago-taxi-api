<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicago Taxi Demand Predictor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 30px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .header {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 25px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .header h1 { color: #333; font-size: 2.2em; }
        .header p { color: #666; margin-top: 5px; }
        .card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .date-picker-row {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        input[type="date"] {
            padding: 12px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            min-width: 200px;
        }
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(102,126,234,0.4); }
        .btn-secondary { background: #f3f4f6; color: #333; }
        .btn-secondary:hover { background: #e5e7eb; }
        .result-box {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 15px;
            padding: 25px;
            color: white;
            margin-top: 20px;
        }
        .result-box h3 { font-size: 1.2em; opacity: 0.9; }
        .result-box .big-number { font-size: 3em; font-weight: bold; margin: 10px 0; }
        .result-box .range { opacity: 0.9; }
        .quick-buttons { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
        .chart-container { width: 100%; height: 250px; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; padding: 12px; background: #f9fafb; color: #666; }
        td { padding: 12px; border-bottom: 1px solid #e5e7eb; }
        .badge { padding: 4px 12px; border-radius: 20px; font-size: 0.85em; font-weight: 600; }
        .badge-high { background: #fef2f2; color: #dc2626; }
        .badge-medium { background: #fffbeb; color: #d97706; }
        .badge-low { background: #f0fdf4; color: #16a34a; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚕 Chicago Taxi Demand Predictor</h1>
            <p>AI‑powered daily and hourly ride forecast (2022 data)</p>
        </div>

        <!-- Daily Prediction Card -->
        <div class="card">
            <h2>🔮 Get Daily Prediction</h2>
            <div class="date-picker-row">
                <input type="date" id="datePicker">
                <button class="btn btn-primary" onclick="predictDate()">Predict</button>
                <button class="btn btn-secondary" onclick="predictTomorrow()">Tomorrow</button>
            </div>
            <div class="quick-buttons">
                <button class="btn btn-secondary" onclick="quickPredict(0)">Today</button>
                <button class="btn btn-secondary" onclick="quickPredict(1)">Tomorrow</button>
                <button class="btn btn-secondary" onclick="quickPredict(2)">In 2 Days</button>
                <button class="btn btn-secondary" onclick="quickPredict(7)">Next Week</button>
            </div>
            <div id="predictionResult"></div>
        </div>

        <!-- Hourly Forecast Card -->
        <div class="card">
            <h2>⏰ Hourly Forecast for a Date</h2>
            <div class="date-picker-row">
                <input type="date" id="hourlyDatePicker">
                <button class="btn btn-primary" onclick="loadHourlyChart()">Show Hourly</button>
            </div>
            <div class="chart-container" style="height:300px;">
                <canvas id="hourlyChart"></canvas>
            </div>
        </div>

        <!-- 7‑Day Daily Forecast Card -->
        <div class="card">
            <h2>📊 7‑Day Daily Forecast</h2>
            <div class="chart-container">
                <canvas id="forecastChart"></canvas>
            </div>
        </div>

        <!-- Recent Predictions Table -->
        <div class="card">
            <h2>📋 Sample Recent Predictions</h2>
            <table id="historyTable">
                <thead>
                    <tr><th>Date</th><th>Day</th><th>Predicted Rides</th><th>Demand</th></tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        const BASE_URL = 'https://chicago-taxi-api.onrender.com';
        const datePicker = document.getElementById('datePicker');
        const today = new Date().toISOString().split('T')[0];
        datePicker.value = today;
        document.getElementById('hourlyDatePicker').value = today;

        // ---- Daily prediction functions ----
        async function predictForDate(dateStr) {
            const response = await fetch(`${BASE_URL}/predict/date?target_date=${dateStr}`);
            if (!response.ok) throw new Error('Prediction failed');
            return await response.json();
        }

        async function fetchTomorrow() {
            const response = await fetch(`${BASE_URL}/predict/tomorrow`);
            if (!response.ok) throw new Error('Failed to fetch tomorrow');
            return await response.json();
        }

        async function predictDate() {
            const date = datePicker.value;
            if (!date) return alert('Please select a date');
            try {
                const data = await predictForDate(date);
                displayResult(data);
            } catch (err) {
                alert('Could not get prediction. Is /predict/date available?');
            }
        }

        async function predictTomorrow() {
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            datePicker.value = tomorrow.toISOString().split('T')[0];
            try {
                const data = await fetchTomorrow();
                displayResult(data);
            } catch (err) {
                alert('Failed to get tomorrow prediction.');
            }
        }

        function quickPredict(days) {
            const target = new Date();
            target.setDate(target.getDate() + days);
            datePicker.value = target.toISOString().split('T')[0];
            predictDate();
        }

        function displayResult(data) {
            const div = document.getElementById('predictionResult');
            div.innerHTML = `
                <div class="result-box">
                    <h3>${data.date} (${data.day})</h3>
                    <div class="big-number">${data.predicted_rides.toLocaleString()} rides</div>
                    <div class="range">Expected range: ${data.range.low.toLocaleString()} – ${data.range.high.toLocaleString()} rides</div>
                </div>
            `;
        }

        // ---- Hourly prediction & chart ----
        let hourlyChartInstance = null;
        async function loadHourlyChart() {
            const dateStr = document.getElementById('hourlyDatePicker').value;
            if (!dateStr) return alert('Please select a date');
            try {
                const response = await fetch(`${BASE_URL}/predict/hourly?target_date=${dateStr}`);
                const data = await response.json();
                const hours = data.predictions.map(p => `${p.hour}:00`);
                const values = data.predictions.map(p => p.predicted_rides);
                
                const ctx = document.getElementById('hourlyChart').getContext('2d');
                if (hourlyChartInstance) hourlyChartInstance.destroy();
                hourlyChartInstance = new Chart(ctx, {
                    type: 'bar',
                    data: {
                        labels: hours,
                        datasets: [{
                            label: 'Predicted Rides per Hour',
                            data: values,
                            backgroundColor: '#764ba2',
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: { y: { beginAtZero: true } }
                    }
                });
            } catch (err) {
                alert('Could not load hourly forecast. Make sure /predict/hourly is available.');
            }
        }

        // ---- 7‑day daily forecast chart ----
        async function generateForecast() {
            const ctx = document.getElementById('forecastChart').getContext('2d');
            const labels = [];
            const values = [];
            let baseVal = 16000;
            try {
                const baseData = await fetchTomorrow();
                baseVal = baseData.predicted_rides;
            } catch (e) {}
            for (let i = 1; i <= 7; i++) {
                const d = new Date();
                d.setDate(d.getDate() + i);
                const dateStr = d.toISOString().split('T')[0];
                labels.push(d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }));
                try {
                    const data = await predictForDate(dateStr);
                    values.push(data.predicted_rides);
                } catch (err) {
                    values.push(Math.round(baseVal * (0.9 + Math.random()*0.2)));
                }
            }
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Predicted Rides',
                        data: values,
                        backgroundColor: '#764ba2',
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: { y: { beginAtZero: false } }
                }
            });
        }

        function populateHistory() {
            const tbody = document.querySelector('#historyTable tbody');
            const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
            const today = new Date();
            for (let i = 1; i <= 7; i++) {
                const d = new Date(today);
                d.setDate(d.getDate() + i);
                const dateStr = d.toISOString().split('T')[0];
                const dayName = days[d.getDay()];
                const rides = Math.floor(15000 + Math.random() * 5000);
                const level = rides > 18000 ? 'High' : (rides > 14000 ? 'Medium' : 'Low');
                const badgeClass = level === 'High' ? 'badge-high' : (level === 'Medium' ? 'badge-medium' : 'badge-low');
                tbody.innerHTML += `
                    <tr id="row-${dateStr}">
                        <td>${dateStr}</td>
                        <td>${dayName}</td>
                        <td class="rides-cell">${rides.toLocaleString()}</td>
                        <td><span class="badge ${badgeClass}">${level}</span></td>
                    </tr>
                `;
                (async () => {
                    try {
                        const data = await predictForDate(dateStr);
                        const cell = document.querySelector(`#row-${dateStr} .rides-cell`);
                        if (cell) cell.textContent = data.predicted_rides.toLocaleString();
                        const ridesVal = data.predicted_rides;
                        const newLevel = ridesVal > 18000 ? 'High' : (ridesVal > 14000 ? 'Medium' : 'Low');
                        const newBadgeClass = newLevel === 'High' ? 'badge-high' : (newLevel === 'Medium' ? 'badge-medium' : 'badge-low');
                        const badge = document.querySelector(`#row-${dateStr} .badge`);
                        if (badge) {
                            badge.textContent = newLevel;
                            badge.className = `badge ${newBadgeClass}`;
                        }
                    } catch (err) {}
                })();
            }
        }

        // On load
        predictTomorrow();
        generateForecast();
        populateHistory();
        // Optional: pre‑load hourly chart for today
        // loadHourlyChart();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chicago Taxi Demand Predictor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 30px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .header {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 25px;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .header h1 { color: #333; font-size: 2.2em; }
        .header p { color: #666; margin-top: 5px; }
        .card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .date-picker-row {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        input[type="date"] {
            padding: 12px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            min-width: 200px;
        }
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(102,126,234,0.4); }
        .btn-secondary { background: #f3f4f6; color: #333; }
        .btn-secondary:hover { background: #e5e7eb; }
        .result-box {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 15px;
            padding: 25px;
            color: white;
            margin-top: 20px;
        }
        .result-box h3 { font-size: 1.2em; opacity: 0.9; }
        .result-box .big-number { font-size: 3em; font-weight: bold; margin: 10px 0; }
        .result-box .range { opacity: 0.9; }
        .quick-buttons { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
        .chart-container { width: 100%; height: 250px; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; padding: 12px; background: #f9fafb; color: #666; }
        td { padding: 12px; border-bottom: 1px solid #e5e7eb; }
        .badge { padding: 4px 12px; border-radius: 20px; font-size: 0.85em; font-weight: 600; }
        .badge-high { background: #fef2f2; color: #dc2626; }
        .badge-medium { background: #fffbeb; color: #d97706; }
        .badge-low { background: #f0fdf4; color: #16a34a; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚕 Chicago Taxi Demand Predictor</h1>
            <p>AI-powered daily ride forecast from 2022 data</p>
        </div>

        <div class="card">
            <h2>🔮 Get Prediction</h2>
            <div class="date-picker-row">
                <input type="date" id="datePicker">
                <button class="btn btn-primary" onclick="predictDate()">Predict</button>
                <button class="btn btn-secondary" onclick="predictTomorrow()">Tomorrow</button>
            </div>
            <div class="quick-buttons">
                <button class="btn btn-secondary" onclick="quickPredict(0)">Today</button>
                <button class="btn btn-secondary" onclick="quickPredict(1)">Tomorrow</button>
                <button class="btn btn-secondary" onclick="quickPredict(2)">In 2 Days</button>
                <button class="btn btn-secondary" onclick="quickPredict(7)">Next Week</button>
            </div>
            <div id="predictionResult"></div>
        </div>

        <div class="card">
            <h2>📊 7-Day Forecast</h2>
            <div class="chart-container">
                <canvas id="forecastChart"></canvas>
            </div>
        </div>

        <div class="card">
            <h2>📋 Sample Recent Predictions</h2>
            <table id="historyTable">
                <thead>
                    <tr><th>Date</th><th>Day</th><th>Predicted Rides</th><th>Demand</th></tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        const API = '/predict/tomorrow'; // We'll use the direct API
        const datePicker = document.getElementById('datePicker');
        // Set today as default
        const today = new Date().toISOString().split('T')[0];
        datePicker.value = today;

        // Helper to call API for a specific date (using /predict/date if available, else we simulate for demo)
        async function predictForDate(dateStr) {
            // Since your API currently only has /predict/tomorrow, we'll just call that and note it's for tomorrow
            // But for a better UX, you could add a /predict/date?date=YYYY-MM-DD endpoint.
            // For now, we simulate a response based on the current date's day-of-week pattern.
            // In a real scenario, you'd call /predict/date?target_date=...
            // Let's actually call /predict/tomorrow and adjust the date display.
            // Since your API is for tomorrow, we'll just show the result as "for the selected date" using mock logic.
            // But to keep it working now, let's just call /predict/tomorrow and modify the displayed date.
            const response = await fetch('/predict/tomorrow');
            const data = await response.json();
            // Override the date to the selected one (cosmetic, since model is for tomorrow's features)
            data.date = dateStr;
            data.day = new Date(dateStr + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'long' });
            // We'll keep the same prediction for demo (actual prediction would require a /predict/date endpoint)
            return data;
        }

        async function predictDate() {
            const date = datePicker.value;
            if (!date) return alert('Please select a date');
            const data = await predictForDate(date);
            displayResult(data);
        }

        async function predictTomorrow() {
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            datePicker.value = tomorrow.toISOString().split('T')[0];
            const response = await fetch('/predict/tomorrow');
            const data = await response.json();
            displayResult(data);
        }

        async function quickPredict(days) {
            const target = new Date();
            target.setDate(target.getDate() + days);
            datePicker.value = target.toISOString().split('T')[0];
            if (days === 1) {
                const response = await fetch('/predict/tomorrow');
                const data = await response.json();
                displayResult(data);
            } else {
                const data = await predictForDate(target.toISOString().split('T')[0]);
                displayResult(data);
            }
        }

        function displayResult(data) {
            const div = document.getElementById('predictionResult');
            div.innerHTML = `
                <div class="result-box">
                    <h3>${data.date} (${data.day})</h3>
                    <div class="big-number">${data.predicted_rides.toLocaleString()} rides</div>
                    <div class="range">Expected range: ${data.range.low.toLocaleString()} – ${data.range.high.toLocaleString()} rides</div>
                </div>
            `;
        }

        // Generate a 7-day forecast (simulated using the API plus noise for demo)
        async function generateForecast() {
            const ctx = document.getElementById('forecastChart').getContext('2d');
            const labels = [];
            const values = [];
            // Get baseline from tomorrow's prediction
            const resp = await fetch('/predict/tomorrow');
            const baseData = await resp.json();
            const baseVal = baseData.predicted_rides;
            
            for (let i = 1; i <= 7; i++) {
                const d = new Date();
                d.setDate(d.getDate() + i);
                labels.push(d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' }));
                // Simulate variation (±10%) for subsequent days
                const variation = 0.9 + Math.random() * 0.2;
                values.push(Math.round(baseVal * variation));
            }
            
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Predicted Rides',
                        data: values,
                        backgroundColor: '#764ba2',
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: { y: { beginAtZero: false } }
                }
            });
        }

        function populateHistory() {
            const tbody = document.querySelector('#historyTable tbody');
            const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
            const today = new Date();
            for (let i = 1; i <= 7; i++) {
                const d = new Date(today);
                d.setDate(d.getDate() + i);
                const dateStr = d.toISOString().split('T')[0];
                const dayName = days[d.getDay()];
                const rides = Math.floor(15000 + Math.random() * 5000);
                const level = rides > 18000 ? 'High' : (rides > 14000 ? 'Medium' : 'Low');
                const badgeClass = level === 'High' ? 'badge-high' : (level === 'Medium' ? 'badge-medium' : 'badge-low');
                tbody.innerHTML += `
                    <tr>
                        <td>${dateStr}</td>
                        <td>${dayName}</td>
                        <td>${rides.toLocaleString()}</td>
                        <td><span class="badge ${badgeClass}">${level}</span></td>
                    </tr>
                `;
            }
        }

        // On load
        predictTomorrow();
        generateForecast();
        populateHistory();
    </script>
</body>
</html>
